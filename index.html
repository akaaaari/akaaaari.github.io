   <h1 lang="en">Cebu Island</h1>
   <p>セブ島（英語: Cebu Island）は、フィリピン中部のビサヤ諸島に位置する細長い島で、首都マニラから南東へ約570kmにあります。
    温暖な気候と美しい海に恵まれ、「南の女王都市」とも呼ばれるセブ市を中心に発展しています。
    観光では、マクタン島のリゾートビーチやダイビングスポット、世界遺産候補のマゼランクロスなどが人気です。
    オスロブではジンベエザメと泳げる体験が有名で、多くの観光客が訪れます。
    歴史と自然、リゾートが調和したフィリピン屈指の観光地です。</p>
